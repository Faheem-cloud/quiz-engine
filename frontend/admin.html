<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Admin Dashboard</h1>

<div class="btn-group">

<button onclick="downloadExcel()">Download Excel</button>

</div>

<table id="resultTable">

<thead>

<tr>
<th>Name</th>
<th>VTU Number</th>
<th>HTML</th>
<th>CSS</th>
<th>JavaScript</th>
<th>Total Score</th>
<th>Date</th>
</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

<script>

// Fetch results from backend
fetch("https://quiz-engine-mt13.onrender.com/admin/results")

.then(res => res.json())

.then(data => {

let table = document.querySelector("#resultTable tbody")

table.innerHTML = ""

data.forEach(student => {

let row = document.createElement("tr")

row.innerHTML = `
<td>${student.name}</td>
<td>${student.vtuno}</td>
<td>${student.html_score}</td>
<td>${student.css_score}</td>
<td>${student.js_score}</td>
<td>${student.total}</td>
<td>${new Date(student.created_at).toLocaleString()}</td>
`

table.appendChild(row)

})

})

.catch(err => {

console.log("Error loading results:", err)

})


// Download Excel
function downloadExcel(){

window.location.href =
"https://quiz-engine-mt13.onrender.com/admin/download-excel"

}

</script>

</body>
</html>
