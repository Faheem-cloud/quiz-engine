
<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Admin Dashboard</h1>

<div class="btn-group">
<button onclick="downloadExcel()">Download Excel</button>
</div>

<p id="status">Loading results...</p>

<table id="resultTable">

<thead>
<tr>
<th>Name</th>
<th>VTU Number</th>
<th>HTML</th>
<th>CSS</th>
<th>JavaScript</th>
<th>Total Score</th>
<th>Date</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>


<script>

const API = "https://quiz-engine-mt13.onrender.com"

let status = document.getElementById("status")

// Fetch results
fetch(API + "/admin/results")

.then(res => res.json())

.then(data => {

let table = document.querySelector("#resultTable tbody")

table.innerHTML = ""

if(!data || data.length === 0){

status.innerText = "No results found"

return

}

status.innerText = ""

data.forEach(student => {

let row = document.createElement("tr")

row.innerHTML = `
<td>${student.name || "-"}</td>
<td>${student.vtuno || "-"}</td>
<td>${student.html_score ?? 0}</td>
<td>${student.css_score ?? 0}</td>
<td>${student.js_score ?? 0}</td>
<td>${student.total ?? 0}</td>
<td>${student.created_at ? new Date(student.created_at).toLocaleString() : "-"}</td>
`

table.appendChild(row)

})

})

.catch(err => {

console.error(err)

status.innerText = "Error loading results"

})


// Download Excel
function downloadExcel(){

window.location.href = API + "/admin/download-excel"

}

</script>

</body>
</html>
